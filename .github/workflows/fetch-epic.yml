name: Fetch Epic Free Games

on:
  schedule:
    # 每周四 16:00 UTC = 北京时间周五 00:00，Epic 更新后
    - cron: '0 16 * * 4'
    # 每天也检查一次（Epic 有时会提前揭晓 Mystery Game）
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - run: node scripts/fetchers/epic-free.js
      - run: npm run validate
      - run: npm run generate
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events/gaming/epic-free.json ical/epic-free.ics
          git diff --staged --quiet || git commit -m "chore: auto-update Epic free games [$(date -u +%Y-%m-%d)]"
          git push
